<h1>Férias Vencidas</h1>

<p>Férias vencidas são aquelas que o trabalhador não tirou dentro do prazo de 12 meses.</p>

<h2>Como calcular</h2>

<p>O valor das férias inclui o salário + adicional de 1/3.</p>

<h2>Na rescisão</h2>

<p>Se houver férias vencidas, elas devem ser pagas integralmente.</p>
